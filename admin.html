<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - ArenaBadminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] },
          extend: {
            colors: {
              primary: {
                50: "#ecfdf5",
                100: "#d1fae5",
                200: "#a7f3d0",
                500: "#10b981",
                600: "#059669",
                700: "#047857",
                800: "#065f46",
                900: "#064e3b",
                950: "#022c22",
              },
              accent: { 500: "#f59e0b", 600: "#d97706" },
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body
    class="bg-primary-900 text-white h-screen w-screen overflow-hidden flex selection:bg-accent-500 selection:text-white"
  >
    <div
      id="toast-container"
      class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"
    ></div>

    <div
      class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-repeat z-0 pointer-events-none"
    ></div>
    <div
      class="absolute top-[-20%] left-[-20%] w-[800px] h-[800px] bg-primary-700 rounded-full blur-[150px] opacity-50 z-0 pointer-events-none"
    ></div>
    <div
      class="absolute bottom-[-20%] right-[-20%] w-[600px] h-[600px] bg-accent-600 rounded-full blur-[150px] opacity-20 z-0 pointer-events-none"
    ></div>

    <aside
      id="sidebar-left"
      class="hidden md:flex md:w-[300px] lg:w-[350px] bg-black/20 backdrop-blur-xl border-r border-white/5 h-full flex-col p-8 text-white relative overflow-hidden shrink-0 z-20"
    >
      <div class="relative z-10 flex flex-col h-full justify-between">
        <div>
          <div class="flex items-center gap-4 mb-10">
            <div class="relative group">
              <div
                class="absolute inset-0 bg-accent-500 blur-md opacity-20 group-hover:opacity-40 transition"
              ></div>
              <img
                src="assets/LogoKecil.png"
                onerror="this.src='bultangkis/LogoKecil.png'"
                alt="Logo"
                class="relative h-14 w-14 rounded-2xl shadow-lg border border-white/20"
              />
            </div>
            <div>
              <h1 class="text-xl font-extrabold tracking-tight">ADMIN</h1>
              <p
                class="text-primary-300 text-[10px] tracking-[0.2em] uppercase font-bold mt-1"
              >
                Control Panel
              </p>
            </div>
          </div>

          <nav class="space-y-3">
            <button
              onclick="setAdminTab('pending')"
              id="btn-pending"
              class="w-full text-left p-4 rounded-2xl flex items-center gap-4 transition-all bg-white/10 border border-white/20 text-white shadow-lg backdrop-blur-sm group hover:scale-[1.02]"
            >
              <span
                class="bg-accent-500 w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold shadow-md text-white group-hover:bg-accent-400 transition"
                >!</span
              >
              <span class="font-bold text-sm">Verifikasi</span>
              <span
                id="badge-count"
                class="ml-auto bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full hidden animate-pulse"
                >0</span
              >
            </button>
            <button
              onclick="setAdminTab('schedule')"
              id="btn-schedule"
              class="w-full text-left p-4 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5 border border-transparent text-primary-200 hover:text-white group"
            >
              <span
                class="bg-primary-800 w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold shadow-md text-emerald-400 group-hover:text-white transition"
              ></span>
              <span class="font-bold text-sm">Kelola Jadwal</span>
            </button>
            <button
              onclick="setAdminTab('history')"
              id="btn-history"
              class="w-full text-left p-4 rounded-2xl flex items-center gap-4 transition-all hover:bg-white/5 border border-transparent text-primary-200 hover:text-white group"
            >
              <span
                class="bg-primary-800 w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold shadow-md text-emerald-400 group-hover:text-white transition"
                >dh</span
              >
              <span class="font-bold text-sm">Riwayat</span>
            </button>
          </nav>
        </div>

        <div>
          <button
            onclick="logout()"
            class="flex items-center gap-3 text-red-300/70 hover:text-red-200 font-bold transition w-fit px-4 py-3 rounded-xl hover:bg-red-500/10 text-sm border border-transparent hover:border-red-500/20"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            <span>Keluar Panel</span>
          </button>
          <div
            class="mt-6 text-[10px] text-primary-400/40 font-medium tracking-wide"
          >
            &copy; 2025 ArenaBadminton Pro.
          </div>
        </div>
      </div>
    </aside>

    <main
      id="main-container"
      class="w-full md:flex-1 h-full relative flex flex-col z-10 overflow-hidden"
    >
      <header
        class="md:hidden bg-black/40 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center z-30 sticky top-0"
      >
        <div class="flex items-center gap-3">
          <img
            src="assets/LogoKecil.png"
            onerror="this.src='bultangkis/LogoKecil.png'"
            class="h-8 w-8 rounded-lg"
          />
          <span class="font-extrabold text-white">ADMIN</span>
        </div>
        <button
          onclick="logout()"
          class="text-xs font-bold text-red-300 bg-red-500/10 px-3 py-1.5 rounded-lg border border-red-500/20"
        >
          Keluar
        </button>
      </header>

      <div
        class="flex-1 overflow-y-auto p-6 md:p-10 relative scroll-smooth z-10"
      >
        <div class="max-w-6xl mx-auto h-full pb-20">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div
              class="bg-white/5 backdrop-blur-md p-6 rounded-[2rem] border border-white/10 flex flex-col justify-center hover:bg-white/10 transition group"
            >
              <div class="flex justify-between items-start">
                <div>
                  <p
                    class="text-xs font-bold text-primary-300 uppercase tracking-wider mb-2"
                  >
                    Total Pendapatan
                  </p>
                  <h3
                    class="text-3xl font-black text-white tracking-tight"
                    id="admin-income"
                  >
                    Rp 0
                  </h3>
                </div>
                <div
                  class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 group-hover:scale-110 transition"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>
                </div>
              </div>
            </div>

            <div
              class="bg-white/5 backdrop-blur-md p-6 rounded-[2rem] border border-white/10 flex flex-col justify-center hover:bg-white/10 transition group"
            >
              <div class="flex justify-between items-start">
                <div>
                  <p
                    class="text-xs font-bold text-primary-300 uppercase tracking-wider mb-2"
                  >
                    Booking Aktif
                  </p>
                  <h3
                    class="text-3xl font-black text-accent-500"
                    id="admin-total-booking"
                  >
                    0
                  </h3>
                </div>
                <div
                  class="w-10 h-10 rounded-full bg-accent-500/20 flex items-center justify-center text-accent-400 group-hover:scale-110 transition"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                    ></path>
                  </svg>
                </div>
              </div>
            </div>

            <div
              class="bg-white/5 backdrop-blur-md p-6 rounded-[2rem] border border-white/10 flex flex-col justify-center hover:bg-white/10 transition relative overflow-hidden group"
            >
              <div
                class="absolute right-0 top-0 w-24 h-24 bg-red-500/10 rounded-bl-[4rem] transition group-hover:bg-red-500/20"
              ></div>
              <div class="relative z-10 flex justify-between items-start">
                <div>
                  <p
                    class="text-xs font-bold text-primary-300 uppercase tracking-wider mb-2"
                  >
                    Perlu Verifikasi
                  </p>
                  <h3
                    class="text-3xl font-black text-red-400"
                    id="admin-pending-count-big"
                  >
                    0
                  </h3>
                </div>
                <div
                  class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center text-red-400 group-hover:scale-110 transition animate-pulse"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                    ></path>
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <div
            id="admin-content-pending"
            class="space-y-4 animate-fade-in"
          ></div>

          <div id="admin-content-schedule" class="hidden animate-fade-in">
            <div
              class="bg-white/5 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/10 shadow-2xl"
            >
              <div class="mb-8 flex justify-between items-end">
                <div>
                  <h3 class="text-2xl font-black text-white">
                    Mode Maintenance
                  </h3>
                  <p class="text-primary-300 text-sm mt-1">
                    Klik slot kosong untuk menutup (maintenance) atau membuka
                    kembali.
                  </p>
                </div>
                <div
                  class="hidden md:flex gap-3 text-[10px] font-bold uppercase tracking-widest text-white/40"
                >
                  <span class="flex items-center gap-1"
                    ><span
                      class="w-2 h-2 rounded-full border border-white/20"
                    ></span>
                    Buka</span
                  >
                  <span class="flex items-center gap-1"
                    ><span class="w-2 h-2 rounded-full bg-red-500"></span>
                    MTC</span
                  >
                  <span class="flex items-center gap-1"
                    ><span
                      class="w-2 h-2 rounded-full bg-emerald-500/40"
                    ></span>
                    Booked</span
                  >
                </div>
              </div>

              <div
                class="flex gap-3 overflow-x-auto pb-6 mb-6 snap-x scrollbar-hide"
                id="admin-date-scroll"
              ></div>
              <div id="admin-slots-grid" class="flex flex-col gap-4"></div>
            </div>
          </div>

          <div id="admin-content-history" class="hidden animate-fade-in">
            <div
              class="bg-white/5 backdrop-blur-xl rounded-[2.5rem] border border-white/10 overflow-hidden shadow-2xl"
            >
              <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                  <thead
                    class="bg-black/20 border-b border-white/5 text-primary-300 uppercase tracking-wider text-xs"
                  >
                    <tr>
                      <th class="p-6 font-bold">Waktu Main</th>
                      <th class="p-6 font-bold">User</th>
                      <th class="p-6 font-bold">Status</th>
                      <th class="p-6 font-bold text-right">Aksi</th>
                    </tr>
                  </thead>
                  <tbody
                    id="admin-history-list"
                    class="divide-y divide-white/5 text-white font-medium"
                  ></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/script.js"></script>
    <style>
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </body>
</html>
