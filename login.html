<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ArenaBadminton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] },
          extend: {
            colors: {
              primary: { 900: "#064e3b", 700: "#047857" },
              accent: { 500: "#f59e0b", 600: "#d97706" },
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-white text-slate-800 h-screen w-screen overflow-hidden flex">
    <main
      id="main-container"
      class="w-full h-full relative flex flex-col bg-slate-50/50 overflow-hidden"
    >
      <div id="bg-decor-dark" class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-primary-900"></div>
        <div
          class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-repeat"
        ></div>
        <div
          class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-primary-700 rounded-full blur-[120px] opacity-50 mix-blend-screen"
        ></div>
        <div
          class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-accent-600 rounded-full blur-[100px] opacity-40 mix-blend-screen"
        ></div>
      </div>

      <div
        class="flex-1 overflow-y-auto p-6 relative z-10 flex items-center justify-center"
      >
        <section
          id="view-auth"
          class="page-section active flex flex-col justify-center items-center w-full"
        >
          <div
            class="w-full max-w-[340px] bg-white/10 backdrop-blur-xl p-6 rounded-[2rem] shadow-2xl border border-white/20 relative"
          >
            <button
              onclick="navTo('view-landing')"
              class="absolute top-5 left-5 text-sm text-white/50 hover:text-white flex items-center gap-1 transition"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 19l-7-7 7-7"
                ></path>
              </svg>
            </button>
            <div class="text-center mb-6 mt-2">
              <div
                class="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-black/20 bg-white/5 border border-white/10 overflow-hidden"
              >
                <img src="assets/LogoKecil.png" alt="Logo" class="w-full h-full object-cover" />
              </div>
              <h3 class="text-2xl font-black text-white">Login Area</h3>
              <p class="text-white/60 text-sm mt-1">
                Masuk untuk mulai booking.
              </p>
            </div>

            <div class="space-y-4">
              <input
                type="text"
                id="username"
                class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/20 focus:border-accent-500 focus:bg-black/40 focus:shadow-[0_0_15px_rgba(245,158,11,0.3)] outline-none transition-all duration-300 font-bold text-white text-sm placeholder:text-white/30"
                placeholder="Username"
              />
              <div class="relative">
                <input
                  type="password"
                  id="password"
                  class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/20 focus:border-accent-500 focus:bg-black/40 focus:shadow-[0_0_15px_rgba(245,158,11,0.3)] outline-none transition-all duration-300 font-bold text-white text-sm placeholder:text-white/30 pr-12"
                  placeholder="Password"
                />
                <button type="button" onclick="togglePassword('password', 'eye-icon-login')" class="absolute inset-y-0 right-0 px-4 flex items-center text-white/50 hover:text-white transition">
                  <svg id="eye-icon-login" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </button>
              </div>
              <button
                onclick="handleLogin()"
                class="w-full py-3 bg-accent-600 text-white font-bold text-sm rounded-xl shadow-lg shadow-accent-600/40 mt-2 hover:scale-[1.02] transition-transform"
              >
                Masuk Sekarang
              </button>
            </div>
            <p class="mt-6 text-center text-xs text-white/40">
              Admin? Gunakan user: <strong class="text-white">admin</strong>
            </p>
          </div>
        </section>
      </div>
    </main>
    <div id="toast-container" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 pointer-events-none"></div>
    <script src="js/script.js"></script>
  </body>
</html>
