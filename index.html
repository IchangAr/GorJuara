<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArenaBadminton - Landing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] },
          extend: {
            colors: {
              primary: {
                50: "#ecfdf5",
                100: "#d1fae5",
                200: "#a7f3d0",
                500: "#10b981",
                600: "#059669",
                700: "#047857",
                800: "#065f46",
                900: "#064e3b",
              },
              accent: { 500: "#f59e0b", 600: "#d97706" },
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    class="bg-primary-900 text-white h-screen w-screen overflow-hidden flex flex-col relative"
  >
    <div
      class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-repeat z-0"
    ></div>
    <div
      class="absolute top-[-20%] left-[-20%] w-[800px] h-[800px] bg-primary-700 rounded-full blur-[150px] opacity-50 z-0"
    ></div>
    <div
      class="absolute bottom-[-20%] right-[-20%] w-[600px] h-[600px] bg-accent-600 rounded-full blur-[150px] opacity-30 z-0"
    ></div>

    <main id="main-container" class="w-full h-full relative flex flex-col z-10">
      <div class="flex-1 overflow-y-auto p-6 md:p-12 relative scroll-smooth">
        <div class="max-w-5xl mx-auto h-full flex flex-col justify-center">
          <section
            id="view-landing"
            class="page-section active h-full justify-center items-center text-center flex flex-col"
          >
            <div class="max-w-2xl mx-auto">
              <h1
                class="text-5xl md:text-7xl font-black text-white mb-6 leading-tight tracking-tight drop-shadow-lg"
              >
                GOR JUARA
              </h1>
              <p
                class="text-primary-100 mb-12 text-xl md:text-2xl leading-relaxed font-medium"
              >
                Sistem Booking Lapangan Premium.<br /><span
                  class="text-accent-500 font-bold"
                  >Main Badminton Jadi Mudah.</span
                >
              </p>
              <div
                class="flex flex-col sm:flex-row gap-5 w-full justify-center"
              >
                <button
                  onclick="navTo('view-schedule-public')"
                  class="py-5 px-10 bg-white/10 backdrop-blur-md border border-white/20 text-white font-bold rounded-2xl hover:bg-white hover:text-primary-900 transition flex items-center justify-center gap-3 shadow-lg"
                >
                  <span class="text-xl"></span> Cek Jadwal
                </button>
                <button
                  onclick="navTo('view-auth')"
                  class="py-5 px-10 bg-accent-600 text-white font-bold rounded-2xl shadow-xl shadow-accent-600/40 hover:bg-accent-500 hover:scale-105 transition flex items-center justify-center gap-3 transform duration-300"
                >
                  <span class="text-xl"></span> Login Member
                </button>
              </div>
            </div>
            <div class="mt-20 text-white/40 text-sm font-medium">
              &copy; 2025 ArenaBadminton System Pro.
            </div>
          </section>

          <section
            id="view-schedule-public"
            class="page-section hidden flex-col pt-10"
          >
            <button
              onclick="navTo('view-landing')"
              class="mb-8 font-bold text-white/70 hover:text-white flex items-center gap-2 w-fit bg-white/10 px-4 py-2 rounded-full backdrop-blur-sm transition"
            >
              &larr; Kembali
            </button>
            <div class="text-center mb-10">
              <h3 class="text-3xl font-black text-white">
                Ketersediaan Lapangan
              </h3>
              <p class="text-primary-200">
                Pantau slot kosong secara real-time.
              </p>
            </div>

            <div id="public-list" class="grid md:grid-cols-2 gap-8 pb-20"></div>
          </section>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
