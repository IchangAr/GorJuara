<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArenaBadminton - Landing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', "sans-serif"] },
          extend: {
            colors: {
              primary: {
                50: "#ecfdf5",
                100: "#d1fae5",
                200: "#a7f3d0",
                500: "#10b981",
                600: "#059669",
                700: "#047857",
                800: "#065f46",
                900: "#064e3b",
              },
              accent: { 500: "#f59e0b", 600: "#d97706" },
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body
    class="bg-primary-900 text-white h-screen w-screen overflow-hidden flex flex-col relative"
  >
    <div
      class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-repeat z-0"
    ></div>
    <div
      class="absolute top-[-20%] left-[-20%] w-[800px] h-[800px] bg-primary-700 rounded-full blur-[150px] opacity-50 z-0"
    ></div>
    <div
      class="absolute bottom-[-20%] right-[-20%] w-[600px] h-[600px] bg-accent-600 rounded-full blur-[150px] opacity-30 z-0"
    ></div>

    <main id="main-container" class="w-full h-full relative flex flex-col z-10">
      <div class="flex-1 overflow-y-auto p-6 md:p-12 relative scroll-smooth">
        <div class="max-w-5xl mx-auto h-full flex flex-col justify-center">
          <section
            id="view-landing"
            class="page-section active h-full justify-center items-center text-center flex flex-col"
          >
            <div class="max-w-2xl mx-auto">
              <img src="assets/LogoKecil.png" alt="GOR JUARA Logo" class="mx-auto h-28 w-28 md:h-36 md:w-36 mb-6 rounded-[2rem] shadow-2xl object-cover" />
              <h1
                class="text-5xl md:text-7xl font-black text-white mb-6 leading-tight tracking-tight drop-shadow-lg"
              >
                GOR JUARA
              </h1>
              <p
                class="text-primary-100 mb-12 text-xl md:text-2xl leading-relaxed font-medium"
              >
                Sistem Booking Lapangan Premium.<br /><span
                  class="text-accent-500 font-bold"
                  >Main Badminton Jadi Mudah.</span
                >
              </p>
              <div
                class="flex flex-col sm:flex-row gap-5 w-full justify-center"
              >
                <button
                  onclick="navTo('view-schedule-public')"
                  class="py-5 px-10 bg-white/10 backdrop-blur-md border border-white/20 text-white font-bold rounded-2xl hover:bg-white hover:text-primary-900 transition flex items-center justify-center gap-3 shadow-lg"
                >
                  <span class="text-xl"></span> Cek Jadwal
                </button>
                <button
                  onclick="navTo('view-auth')"
                  class="py-5 px-10 bg-accent-600 text-white font-bold rounded-2xl shadow-xl shadow-accent-600/40 hover:bg-accent-500 hover:scale-105 transition flex items-center justify-center gap-3 transform duration-300"
                >
                  <span class="text-xl"></span> Login Member
                </button>
              </div>
            </div>
            <div class="mt-20 text-white/40 text-sm font-medium">
              &copy; 2025 ArenaBadminton System Pro.
            </div>
          </section>

          <section
            id="view-schedule-public"
            class="page-section hidden flex-col pt-10"
          >
            <button
              onclick="navTo('view-landing')"
              class="mb-8 font-bold text-white/70 hover:text-white flex items-center gap-2 w-fit bg-white/10 px-4 py-2 rounded-full backdrop-blur-sm transition"
            >
              &larr; Kembali
            </button>
            <div class="text-center mb-10">
              <h3 class="text-3xl font-black text-white">
                Pilih Jadwal
              </h3>
              <p class="text-primary-200">
                Klik pada jadwal yang kosong (hijau) untuk Booking.
              </p>
            </div>

            <div id="public-list" class="grid md:grid-cols-2 gap-8 pb-20"></div>
          </section>

          <section
            id="view-guest-form"
            class="page-section hidden flex-col pt-10 max-w-xl mx-auto w-full"
          >
            <button
              onclick="navTo('view-schedule-public')"
              class="mb-6 font-bold text-white/70 hover:text-white flex items-center gap-2 w-fit bg-white/10 px-4 py-2 rounded-full backdrop-blur-sm transition"
            >
              &larr; Batal
            </button>
            <div class="bg-black/20 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] border border-white/10 shadow-xl w-full">
              <h2 class="text-2xl font-black text-white mb-6">Selesaikan Booking</h2>
              
              <div class="bg-primary-900/50 rounded-2xl p-4 border border-white/5 mb-6 flex justify-between items-center">
                <div>
                  <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mb-1">Jadwal Terpilih</p>
                  <p class="text-lg font-bold text-white" id="guest-pay-date">-</p>
                  <p class="text-white/70 text-sm mt-1" id="guest-pay-time">-</p>
                </div>
                <div class="text-right">
                  <p class="text-2xl font-black text-white" id="guest-pay-price">Rp 50.000</p>
                </div>
              </div>

              <form id="guest-form" onsubmit="submitGuestBooking(event)" class="space-y-5">
                <div>
                  <label class="block text-xs font-bold text-primary-200 mb-2 uppercase tracking-widest">Durasi Main</label>
                  <select id="guest-duration" onchange="updateGuestDuration()" class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/20 focus:border-accent-500 outline-none text-white text-sm font-bold">
                    <option value="1" class="bg-primary-900">1 Jam</option>
                    <option value="2" class="bg-primary-900">2 Jam</option>
                    <option value="3" class="bg-primary-900">3 Jam</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-bold text-primary-200 mb-2 uppercase tracking-widest">Nama Lengkap</label>
                  <input type="text" id="guest-name" required class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/20 focus:border-accent-500 outline-none text-white text-sm" placeholder="Contoh: Budi Santoso">
                </div>
                <div>
                  <label class="block text-xs font-bold text-primary-200 mb-2 uppercase tracking-widest">No. WhatsApp</label>
                  <input type="number" id="guest-phone" required class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/20 focus:border-accent-500 outline-none text-white text-sm" placeholder="Contoh: 08123456789">
                </div>
                <div>
                  <label class="block text-xs font-bold text-primary-200 mb-2 uppercase tracking-widest">Metode Pembayaran</label>
                  <div class="flex items-center gap-4 p-4 rounded-xl border border-accent-500 bg-accent-500/10">
                    <span class="text-sm font-bold text-white">Transfer / QRIS (Bayar di tempat)</span>
                  </div>
                </div>
                <button type="submit" id="guest-btn-pay" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl shadow-xl shadow-emerald-500/20 transition-all mt-4">
                  Booking Sekarang
                </button>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>
    <div id="toast-container" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 pointer-events-none"></div>
    <script src="js/script.js"></script>
  </body>
</html>
